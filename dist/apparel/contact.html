<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | URBAN CLOSET</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container">
      <div class="logo">
        <a href="index.html">URBAN CLOSET</a>
      </div>
      <nav>
        <ul>
          <li><a href="collections.html">COLLECTIONS</a></li>
          <li><a href="lookbook.html">LOOKBOOK</a></li>
          <li><a href="brand-story.html">STORY</a></li>
          <li><a href="contact.html" style="font-weight: 400;">CONTACT</a></li>
        </ul>
      </nav>
      <div class="header-icons">
        <a href="#"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a>
        <a href="#"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg></a>
      </div>
    </div>
  </header>

  <main style="padding-top: 120px;">
    <div class="container" style="max-width: 800px;">
      <div class="fade-in" style="text-align: center; margin-bottom: 60px;">
        <h1 class="typography-en">Contact</h1>
        <p style="font-size: 13px; color: var(--color-gray); margin-top: 20px;">
          製品に関するお問い合わせや、ポップアップのご案内、<br>
          プレス関係のご連絡はこちらのフォームより承っております。
        </p>
      </div>

      <form action="#" class="contact-form fade-in">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="product">About Products</option>
            <option value="press">Press / Media</option>
            <li><option value="other">Other</option></li>
          </select>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Your Message" required></textarea>
        </div>
        
        <div class="spacer-md"></div>
        
        <div style="text-align: center;">
          <button type="submit" class="btn" style="width: 200px;">SEND</button>
        </div>
      </form>

      <div class="spacer-lg"></div>
      
      <div class="contact-info fade-in" style="text-align: center; font-size: 13px; color: var(--color-gray);">
        <p>Email: contact@urbancloset-tokyo.com</p>
        <p>Hours: Mon - Fri / 10:00 - 18:00</p>
        <div class="spacer-md"></div>
        <div class="sns-links">
          <a href="#" style="margin: 0 10px;">Instagram</a>
          <a href="#" style="margin: 0 10px;">X (Twitter)</a>
        </div>
      </div>
    </div>
  </main>

  <div class="spacer-lg"></div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="copyright">
        &copy; 2026 URBAN CLOSET. All Rights Reserved.
      </div>
    </div>
  </footer>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>

  <style>
    .contact-form {
      background-color: #fff;
    }

    .form-group {
      margin-bottom: 30px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 10px;
      color: var(--color-gray);
    }

    .form-group input, 
    .form-group select, 
    .form-group textarea {
      width: 100%;
      padding: 15px 0;
      border: none;
      border-bottom: 1px solid var(--color-border);
      font-family: var(--font-jp);
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
      background: transparent;
    }

    .form-group input:focus, 
    .form-group select:focus, 
    .form-group textarea:focus {
      border-color: var(--color-black);
    }

    .contact-info p {
      margin-bottom: 10px;
    }
  </style>

</body>
</html>
